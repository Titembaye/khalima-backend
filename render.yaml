services:
  - type: web
    name: khalima-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn khalima.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: khalima.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: khalima-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://khalima.vercel.app
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: khalima-db
    databaseName: khalima
    user: khalima
