services:
  - type: web
    name: data4chad-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py setup_languages
    startCommand: gunicorn khalima.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: khalima.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: khalima-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://data4chad.vercel.app
      - key: FRONTEND_URL
        value: https://data4chad.vercel.app
      # Email — valeurs non-secrètes
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: "DATA4CHAD <noreply@data4chad.com>"
      # Email — secrets à renseigner manuellement dans le dashboard Render
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: khalima-db
    databaseName: khalima
    user: khalima
